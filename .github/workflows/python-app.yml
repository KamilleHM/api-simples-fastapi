# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14
      uses: actions/setup-python@v3
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        python -m pytest


  notify-discord:
    needs: deployment
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Discord
        run: |
          STATUS="${{ needs.deployment.result }}"
          if [ "$STATUS" = "success" ]; then
            COLOR="28a745"
            TITLE="PR Finalizado com Sucesso!"
            DESCRIPTION="Todos os testes passaram e o deployment foi realizado com sucesso! 🚀"
          else
            COLOR="dc3545"
            TITLE="PR Falhou!"
            DESCRIPTION="Houve uma falha em alguma das etapas. Verifique os logs para mais detalhes."
          fi
          
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"description\": \"$DESCRIPTION\",
                \"color\": \"0x$COLOR\",
                \"fields\": [
                  {\"name\": \"Repositório\", \"value\": \"${{ github.repository }}\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"[${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\", \"inline\": false},
                  {\"name\": \"Autor\", \"value\": \"${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Status\", \"value\": \"$STATUS\", \"inline\": true}
                ],
                \"footer\": {\"text\": \"GitHub Actions\"},
                \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"
              }]
            }"

  deployment:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip project files
        run: |
          zip -r project.zip . -x '*.git*' '*.venv*' '*.pytest_cache*' '*.mypy_cache*' '*.github/artifacts*'

      - name: Upload project artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-zip
          path: project.zip